<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRASA Modal Test</title>
<style>
body { background: #0D1B2A; color: white; font-family: sans-serif; 
       display: flex; align-items: center; justify-content: center; 
       min-height: 100vh; margin: 0; }
button { padding: 1rem 2rem; background: #0E9B8A; color: white; 
         border: none; border-radius: 50px; font-size: 1rem; cursor: pointer; }
#m { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
     z-index: 9999; align-items: center; justify-content: center; }
#m.on { display: flex; }
#box { background: #1a2a3a; padding: 2rem; border-radius: 12px; 
       max-width: 400px; width: 90%; text-align: center; }
#box button { background: #555; margin-top: 1rem; }
</style>
</head>
<body>
<button onclick="document.getElementById('m').classList.add('on')">
  🌐 Sign up here
</button>
<div id="m" onclick="if(event.target===this)this.classList.remove('on')">
  <div id="box">
    <h2>Modal works! ✅</h2>
    <p>If you can see this, the button is working.</p>
    <button onclick="document.getElementById('m').classList.remove('on')">Close</button>
  </div>
</div>
</body>
</html>
